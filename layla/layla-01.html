<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Layla's Workshop – Energy Cannon Chronicles</title>
    <link rel="stylesheet" href="layla-01.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="module" src="layla-01.js"></script>
</head>
<body>
<div class="particles-bg" id="particlesBg"></div>
<button class="open-btn" id="openBtn">⚡ Power Up ⚡</button>
<div class="overlay" id="overlay">
    <div class="card">
        <button class="close-btn" id="closeBtn">✕</button>
        <h2>⚡ Layla – Energy Cannon Forge ⚡</h2>
        <div class="canvas-wrap">
            <canvas id="c"></canvas>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Charging capacitors…</p>
            </div>
        </div>
        <div class="btns"></div>
        <div class="controls">
            <label><input type="checkbox" id="loopCheckbox"> Loop</label>
            <input type="number" id="seqCount" value="1" min="1" max="99" step="1">
            <span id="seqDisplay">1</span>
            <button id="camFree">Free</button>
            <button id="camTrack">Track</button>
            <button id="camFPV">FPV</button>
            <button id="dayNightToggle">🌞 Day / Night 🌙</button>
        </div>
        <p class="hint">⚡ Drag to orbit · Scroll to zoom ⚡</p>
    </div>
</div>
</body>
</html>
