<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kagura – Cherry Blossom Shrine</title>
    <link rel="stylesheet" href="kagura.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Social sharing (Open Graph) -->
    <meta property="og:title" content="Kagura – Cherry Blossom Shrine">
    <meta property="og:description" content="Chase your ninja lover through a magical cherry blossom world.">
    <meta property="og:image" content="https://iritachii-cloud.github.io/GSAP_Profile/kagura-modal/favicon3.png">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">
    <meta property="og:url" content="https://iritachii-cloud.github.io/GSAP_Profile/kagura-modal/">
    <meta property="og:type" content="website">

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Kagura – Cherry Blossom Shrine">
    <meta name="twitter:description" content="Chase your ninja lover through a magical cherry blossom world.">
    <meta name="twitter:image" content="https://iritachii-cloud.github.io/GSAP_Profile/kagura-modal/favicon.png">

    <!-- Theme colour for mobile browsers -->
    <meta name="theme-color" content="#1a0010">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three":         "https://unpkg.com/three@0.161.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="kagura.js"></script>
</head>
<body>

<div class="particles-bg" id="particlesBg"></div>

<button class="open-btn" id="openBtn">🌸 Invoke Kagura 🌸</button>

<div class="overlay" id="overlay">
    <div class="card">
        <button class="close-btn" id="closeBtn">✕</button>
        <h2>🌸 Kagura – Cherry Storm 🌸</h2>
        <div class="canvas-wrap">
            <canvas id="c"></canvas>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Cherry blossoms gathering…</p>
            </div>
        </div>
        <div class="btns"></div>
        <p class="hint">🌸 Drag to rotate · Scroll to zoom 🌸</p>
    </div>
</div>

</body>
</html>
