<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Card | Digital Shadow Archive</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    /* Card page exclusive enhancements */
    body {
      background: radial-gradient(circle at 20% 20%, #1a0a1e, #0a0a0f);
    }
    .card-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
      padding: 2rem;
      position: relative;
    }
    /* Holographic overlay */
    .flip-card {
      width: 360px;
      height: 540px;
      perspective: 1500px;
      filter: drop-shadow(0 0 30px rgba(255,51,102,0.6));
    }
    .flip-front, .flip-back {
      background: rgba(10,10,25,0.9);
      backdrop-filter: blur(15px);
      border: 2px solid var(--accent);
      border-radius: 24px;
      overflow: hidden;
    }
    .flip-front::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(255,51,102,0.2) 0%, transparent 50%, rgba(0,229,255,0.2) 100%);
      pointer-events: none;
    }
    .flip-img {
      height: 220px;
      object-fit: cover;
      border-bottom: 2px solid var(--accent);
    }
    .flip-details {
      padding: 1.5rem;
      position: relative;
      z-index: 2;
    }
    .flip-details h2 {
      color: var(--accent);
      text-shadow: 0 0 15px var(--glow-pink);
    }
    .flip-row {
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 0.2rem 0;
      display: flex;
      justify-content: space-between;
    }
    .flip-row span:first-child {
      color: var(--text2);
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }
    .flip-row span:last-child {
      color: var(--accent2);
      font-weight: 600;
    }
    .card-particles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent2);
      border-radius: 50%;
      opacity: 0.5;
      animation: float 4s infinite ease-in-out;
    }
    /* Scanlines */
    .scanlines {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.1) 2px,
        rgba(0,0,0,0.1) 4px
      );
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo"><a href="index.html">SHADOW ARCHIVE</a></div>
    <nav><a href="index.html">Home</a><a href="card.html" class="active">Card</a></nav>
  </header>

  <main class="card-container">
    <div id="lockedMsg" class="form-box hidden" style="z-index:10;">
      <h2>🔒 Shadow Locked</h2>
      <p>Enter Card ID and Secret Code to reveal.</p>
      <form id="unlockForm">
        <input type="text" id="cardIdInput" placeholder="Card ID" required>
        <input type="text" id="cardSecretInput" placeholder="Secret Code" required>
        <button class="btn btn-primary">Unlock</button>
      </form>
      <p style="margin-top:1rem;">Example: <a href="?id=Bijusayswaddup">Bijusayswaddup</a> (no secret)</p>
    </div>

    <div id="cardDisplay" class="hidden" style="position:relative;">
      <div class="flip-card" id="flipCard">
        <div class="flip-card-inner">
          <div class="flip-front">
            <div class="scanlines"></div>
            <img id="cardDp" class="flip-img" src="" alt="Shadow DP">
            <div class="flip-details">
              <h2 id="cardName"></h2>
              <p id="cardTypeBadge" style="color:var(--accent); font-weight:600;"></p>
              <div class="flip-row"><span>Organization</span><span id="cardOrg"></span></div>
              <div class="flip-row"><span>Role</span><span id="cardRole"></span></div>
              <div class="flip-row"><span>ID</span><span id="cardIdDisplay"></span></div>
            </div>
          </div>
          <div class="flip-back">
            <div class="scanlines"></div>
            <div class="flip-details">
              <h2>Classified Intel</h2>
              <div class="flip-row"><span>Born</span><span id="cardDOB"></span></div>
              <div class="flip-row"><span>Blood</span><span id="cardBlood"></span></div>
              <div class="flip-row"><span>Likes</span><span id="cardLikes"></span></div>
              <div class="flip-row"><span>Dislikes</span><span id="cardDislikes"></span></div>
              <div class="flip-row"><span>Personality</span><span id="cardPersonality"></span></div>
              <div class="flip-row"><span>Motto</span><span id="cardMotto"></span></div>
              <div class="flip-row"><span>Quote</span><span id="cardQuote"></span></div>
            </div>
          </div>
        </div>
      </div>
      <!-- Floating particles -->
      <div class="card-particles" id="particles"></div>
    </div>
  </main>

  <footer>© 2026 Digital Shadow Archive</footer>

  <script src="secret.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/github.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    (async () => {
      await DataSystem.loadCards();
      const params = Utils.getParams();
      const id = params.id;
      const secret = params.secret;
      let card = null;

      if (id === 'Bijusayswaddup') card = DataSystem.getCardById(id);
      else if (id && secret) card = DataSystem.getBySecret(id, secret);
      else if (UserSession.isLoggedIn()) card = UserSession.get();

      if (card) revealCard(card);
      else document.getElementById('lockedMsg').classList.remove('hidden');

      document.getElementById('unlockForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const sid = document.getElementById('cardIdInput').value.trim();
        const ssec = document.getElementById('cardSecretInput').value.trim();
        const c = DataSystem.getBySecret(sid, ssec);
        if (c) revealCard(c);
        else alert('Wrong ID or Secret.');
      });

      function revealCard(card) {
        document.getElementById('lockedMsg').classList.add('hidden');
        document.getElementById('cardDisplay').classList.remove('hidden');

        // Front side
        document.getElementById('cardDp').src = card.media?.dp || 'assets/images/default-dp.png';
        document.getElementById('cardName').textContent = `${card.coreIdentity.firstName} ${card.coreIdentity.lastName}`;
        document.getElementById('cardTypeBadge').textContent = card.officialDetails?.cardType || '';
        document.getElementById('cardOrg').textContent = card.officialDetails?.organization || '';
        document.getElementById('cardRole').textContent = card.officialDetails?.role || '';
        document.getElementById('cardIdDisplay').textContent = card.id;

        // Back side details
        document.getElementById('cardDOB').textContent = Utils.formatDate(card.coreIdentity.dateOfBirth);
        document.getElementById('cardBlood').textContent = card.coreIdentity.bloodGroup || 'Unknown';
        document.getElementById('cardLikes').textContent = (card.likesDislikes?.likes || []).join(', ');
        document.getElementById('cardDislikes').textContent = (card.likesDislikes?.dislikes || []).join(', ');
        document.getElementById('cardPersonality').textContent = card.personalityTraits?.personalityType || '';
        document.getElementById('cardMotto').textContent = card.storyMode?.lifeMotto || '';
        document.getElementById('cardQuote').textContent = card.favorites?.quote || '';

        // Particles effect
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          p.style.left = Math.random() * 100 + '%';
          p.style.top = Math.random() * 100 + '%';
          p.style.animationDelay = Math.random() * 4 + 's';
          particlesContainer.appendChild(p);
        }

        // GSAP entrance
        gsap.from('#flipCard', { scale: 0.8, opacity: 0, duration: 1, ease: 'elastic.out(1,0.7)' });
        gsap.to('.particle', { opacity: 0, duration: 1, stagger: 0.05, yoyo: true, repeat: -1 });
      }

      // Flip trigger
      document.getElementById('flipCard').addEventListener('click', function() {
        this.classList.toggle('flipped');
      });
    })();
  </script>
</body>
</html>
