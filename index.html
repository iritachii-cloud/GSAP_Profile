<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Shadow Archive | Home</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <canvas id="home3d"></canvas>
  <header>
    <div class="logo">SHADOW ARCHIVE</div>
    <nav>
      <a href="index.html" class="active">Home</a>
      <a href="login.html">Login</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="card.html">Card</a>
    </nav>
  </header>
  <main>
    <section class="hero">
      <h1 id="heroTitle">Loading...</h1>
      <p id="heroSubtitle"></p>
      <a id="heroCta" href="register.html" class="btn btn-primary">Summon a Shadow</a>
    </section>
    <section class="features" id="featuresContainer"></section>
    <section class="steps" id="stepsContainer"></section>
  </main>
  <footer>© 2026 Digital Shadow Archive – We see your true self.</footer>

  <script src="secret.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    (async () => {
      await DataSystem.loadHomepage();
      const h = DataSystem.homepage;
      if (!h) return;
      document.getElementById('heroTitle').innerHTML = h.hero.title;
      document.getElementById('heroSubtitle').textContent = h.hero.subtitle;
      document.getElementById('heroCta').textContent = h.hero.cta;
      const feat = document.getElementById('featuresContainer');
      h.features.forEach(f => {
        const d = document.createElement('div');
        d.className = 'feature-card';
        d.innerHTML = `<div class="feature-icon">${f.icon}</div><h3>${f.title}</h3><p>${f.description}</p>`;
        feat.appendChild(d);
      });
      const steps = document.getElementById('stepsContainer');
      h.steps.forEach(s => {
        const d = document.createElement('div');
        d.className = 'step';
        d.innerHTML = `<div class="step-number">${s.number}</div><div><h3>${s.title}</h3><p>${s.text}</p></div>`;
        steps.appendChild(d);
      });
    })();
  </script>
</body>
</html>
