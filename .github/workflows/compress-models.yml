name: Compress GLB Models

on:
  push:
    paths:
      - '**/*.glb'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compress:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install compression tools
        run: |
          npm install -g gltf-pipeline
          npm install -g @gltf-transform/cli

      - name: Compress GLB files
        run: |
          shopt -s globstar nullglob
          for f in **/*.glb; do
            SIZE=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
            if [ "$SIZE" -lt 5242880 ]; then
              echo "⏭  Skipping $f ($(( SIZE / 1024 )) KB — looks already compressed)"
              continue
            fi
            echo "▶  Processing $f  ($(( SIZE / 1024 / 1024 )) MB)…"

            # Step A: Draco geometry compression
            gltf-pipeline \
              -i "$f" \
              -o "$f.draco.glb" \
              --draco.compressionLevel 7 \
              --draco.quantizePositionBits 14 \
              --draco.quantizeNormalBits 10 \
              --draco.quantizeTexcoordBits 12

            # Step B: WebP texture conversion + sRGB tag (--srgb)
            gltf-transform webp "$f.draco.glb" "$f.final.glb" --quality 80 --srgb

            # Replace original only if smaller
            NEW_SIZE=$(stat -c%s "$f.final.glb" 2>/dev/null || stat -f%z "$f.final.glb")
            if [ "$NEW_SIZE" -lt "$SIZE" ]; then
              mv "$f.final.glb" "$f"
              echo "✅  $f: $(( SIZE / 1024 )) KB → $(( NEW_SIZE / 1024 )) KB"
            else
              echo "⚠️  $f: compression did not reduce size, keeping original"
            fi

            rm -f "$f.draco.glb" "$f.final.glb"
          done

      - name: Commit compressed models
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet \
            && echo "✅ No changes — models were already optimal." \
            || (git commit -m "chore: auto-compress GLB models [skip ci]" && git push)