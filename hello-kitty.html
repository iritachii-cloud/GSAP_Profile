<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hello Kitty 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three":         "https://unpkg.com/three@0.161.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
        }
    }
    </script>
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Fredoka One', cursive;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(140deg, #ffe0ee 0%, #ffc2d4 55%, #ffaac8 100%);
            overflow: hidden;
        }

        .hearts-bg { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
        .hb {
            position:absolute; animation: floatHeart linear infinite; opacity:0;
        }
        @keyframes floatHeart {
            0%   { transform:translateY(108vh) rotate(0deg); opacity:0; }
            6%   { opacity:.55; }
            94%  { opacity:.28; }
            100% { transform:translateY(-10vh) rotate(360deg); opacity:0; }
        }

        .open-btn {
            position:relative; z-index:1;
            font-family:'Fredoka One',cursive; font-size:1.75rem; color:#fff;
            background:linear-gradient(135deg,#ff69b4,#ff1493);
            border:none; padding:1.1rem 2.6rem; border-radius:60px; cursor:pointer;
            box-shadow:0 6px 0 #a50060, 0 16px 36px rgba(255,20,147,.35);
            transition:transform .14s, box-shadow .14s;
        }
        .open-btn:hover  { transform:translateY(-4px); box-shadow:0 10px 0 #a50060,0 24px 44px rgba(255,20,147,.45); }
        .open-btn:active { transform:translateY(2px);  box-shadow:0 3px  0 #a50060,0  8px 18px rgba(255,20,147,.3); }

        .overlay {
            position:fixed; inset:0; z-index:100;
            background:rgba(255,180,215,.48);
            backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            display:flex; align-items:center; justify-content:center; padding:1rem;
            visibility:hidden; opacity:0;
            transition:visibility .3s, opacity .3s;
        }
        .overlay.open { visibility:visible; opacity:1; }

        .card {
            position:relative;
            background:rgba(255,255,255,.94);
            border-radius:38px; width:100%; max-width:600px;
            padding:1.8rem 1.6rem 1.4rem; text-align:center;
            box-shadow:0 0 0 3px #ff69b4,0 0 0 7px rgba(255,105,180,.18),0 40px 80px rgba(180,0,80,.22);
            transform:scale(.78) translateY(30px); opacity:0;
            transition:transform .42s cubic-bezier(.34,1.28,.64,1), opacity .32s ease;
        }
        .overlay.open .card { transform:scale(1) translateY(0); opacity:1; }

        .close-btn {
            position:absolute; top:1rem; right:1rem;
            width:40px; height:40px; border-radius:50%;
            background:linear-gradient(135deg,#ff69b4,#ff1493);
            color:#fff; border:none; font-size:1.1rem; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            box-shadow:0 4px 12px rgba(255,20,147,.4);
            transition:transform .2s, box-shadow .2s;
        }
        .close-btn:hover { transform:rotate(90deg) scale(1.12); box-shadow:0 6px 18px rgba(255,20,147,.6); }

        h2 {
            font-size:2.2rem; margin-bottom:.8rem; letter-spacing:.5px;
            background:linear-gradient(135deg,#ff69b4 25%,#ff1493);
            -webkit-background-clip:text; background-clip:text; color:transparent;
        }

        .canvas-wrap {
            width:100%; height:400px; border-radius:26px; overflow:hidden;
            background:linear-gradient(155deg,#fff5fb 0%,#fde8f5 100%);
            box-shadow:inset 0 0 0 2px #ffb6c1, 0 8px 22px rgba(0,0,0,.08);
            position:relative;
        }
        canvas { width:100%!important; height:100%!important; display:block; }

        .loading {
            position:absolute; inset:0;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            gap:.7rem; pointer-events:none; transition:opacity .5s;
        }
        .loading.hidden { opacity:0; }
        .spinner {
            width:46px; height:46px; border-radius:50%;
            border:4px solid #ffb6c1; border-top-color:#ff1493;
            animation:spin .75s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        .loading p { font-size:.95rem; color:#e0559a; }

        .btns {
            display:flex; gap:.6rem; justify-content:center; flex-wrap:wrap;
            margin:1.3rem 0 .5rem;
        }
        .btns button {
            font-family:'Fredoka One',cursive; font-size:.9rem; color:#fff;
            background:linear-gradient(135deg,#ff7ec4,#ff1493);
            border:none; padding:.58rem 1.2rem; border-radius:40px; cursor:pointer;
            box-shadow:0 4px 0 #a50060, 0 8px 14px rgba(255,20,147,.22);
            transition:transform .12s, box-shadow .12s;
        }
        .btns button:hover  { transform:translateY(-3px); box-shadow:0 7px 0 #a50060,0 14px 22px rgba(255,20,147,.32); }
        .btns button:active { transform:translateY(1px);  box-shadow:0 2px 0 #a50060; }
        .btns button.active {
            background:linear-gradient(135deg,#fff5fa,#ffe0f0);
            color:#ff1493;
            box-shadow:0 3px 0 #ffb6c1, inset 0 0 0 2px #ff69b4;
        }

        .hint { font-size:.74rem; color:#ff69b4; opacity:.72; margin-top:.4rem; }

        @media(max-width:560px){
            .canvas-wrap { height:300px; }
            h2 { font-size:1.7rem; }
            .card { padding:1.4rem 1rem 1.1rem; border-radius:28px; }
        }
    </style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<button class="open-btn" id="openBtn">🎀 Open Hello Kitty 3D</button>

<div class="overlay" id="overlay">
    <div class="card">
        <button class="close-btn" id="closeBtn">✕</button>
        <h2>🐱 Hello Kitty 🎀</h2>
        <div class="canvas-wrap">
            <canvas id="c"></canvas>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading Hello Kitty…</p>
            </div>
        </div>
        <div class="btns">
            <button data-anim="dance">💃 Dance</button>
            <button data-anim="jump">🦘 Jump</button>
            <button data-anim="spin">🌀 Spin</button>
            <button data-anim="attack">💖 Heart Attack</button>
            <button data-anim="reset">↩ Reset</button>
        </div>
        <p class="hint">✨ Drag to rotate · Scroll to zoom ✨</p>
    </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';

// ── Floating emoji background ─────────────────────────────────────────
const EMOJIS = ['🎀','💕','⭐','✨','💗','🌸','💖','🍓'];
document.querySelectorAll('#heartsBg').forEach(bg => {
    for (let i = 0; i < 24; i++) {
        const el = document.createElement('span');
        el.className = 'hb';
        el.textContent = EMOJIS[i % EMOJIS.length];
        el.style.cssText = `
            left:${Math.random()*100}%;
            font-size:${.9 + Math.random()*1.3}rem;
            animation-duration:${10 + Math.random()*14}s;
            animation-delay:${-Math.random()*22}s;
        `;
        bg.appendChild(el);
    }
});

// ── Three.js ──────────────────────────────────────────────────────────
let renderer, scene, camera, controls, kitty;
let currentAnim = null;
const canvas  = document.getElementById('c');
const overlay = document.getElementById('overlay');
const loading = document.getElementById('loading');

function initScene() {
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(38, 1, 0.01, 200);
    camera.position.set(0, 1.5, 5);

    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputColorSpace    = THREE.SRGBColorSpace;
    renderer.toneMapping         = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.25;
    renderer.shadowMap.enabled   = true;
    renderer.shadowMap.type      = THREE.PCFSoftShadowMap;

    // Warm studio lighting
    scene.add(new THREE.AmbientLight(0xfff4fa, 1.4));

    const key = new THREE.DirectionalLight(0xffeef8, 3.0);
    key.position.set(3, 6, 4);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.bias = -0.001;
    scene.add(key);

    const fill = new THREE.DirectionalLight(0xffd6ec, 1.1);
    fill.position.set(-4, 3, 2);
    scene.add(fill);

    const rim = new THREE.DirectionalLight(0xbbccff, 0.7);
    rim.position.set(0, 2, -4);
    scene.add(rim);

    scene.add(new THREE.HemisphereLight(0xffd6ec, 0xffffff, 0.8));

    // Soft shadow floor
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 20),
        new THREE.ShadowMaterial({ opacity: 0.13 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    controls = new OrbitControls(camera, canvas);
    controls.enableDamping  = true;
    controls.dampingFactor  = 0.07;
    controls.autoRotate     = false;
    controls.enablePan      = false;
    controls.minDistance    = 1;
    controls.maxDistance    = 12;

    (function loop() {
        requestAnimationFrame(loop);
        // gentle idle float when no anim running
        if (kitty && !currentAnim) {
            kitty.position.y = (kitty.userData.baseY ?? 0) + Math.sin(performance.now() * 0.0014) * 0.05;
        }
        controls.update();
        renderer.render(scene, camera);
    })();

    window.addEventListener('resize', onResize);
    onResize();
}

function loadModel() {
    new GLTFLoader().load(
        'hello_kitty.glb',
        (gltf) => {
            kitty = gltf.scene;

            // Auto-fit: centre and scale to ~2.4 units tall
            const box    = new THREE.Box3().setFromObject(kitty);
            const size   = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale  = 2.4 / maxDim;

            kitty.scale.setScalar(scale);
            kitty.position.sub(center.multiplyScalar(scale));

            // Sit on floor
            const box2 = new THREE.Box3().setFromObject(kitty);
            kitty.position.y -= box2.min.y;
            kitty.userData.baseY = kitty.position.y;

            kitty.traverse(obj => {
                if (obj.isMesh) {
                    obj.castShadow = obj.receiveShadow = true;
                }
            });

            scene.add(kitty);

            // Point camera at model mid-point
            const mid = new THREE.Box3().setFromObject(kitty).getCenter(new THREE.Vector3());
            controls.target.copy(mid);
            camera.position.set(mid.x, mid.y + 0.4, mid.z + 4.5);
            controls.update();

            loading.classList.add('hidden');
        },
        xhr => {
            if (xhr.total) {
                loading.querySelector('p').textContent =
                    `Loading… ${Math.round(xhr.loaded / xhr.total * 100)}%`;
            }
        },
        err => {
            console.error(err);
            loading.querySelector('p').textContent = '⚠️ Could not load model.\nMake sure hello_kitty.glb is in the same folder as this HTML file.';
        }
    );
}

function onResize() {
    const wrap = document.querySelector('.canvas-wrap');
    const w = wrap.clientWidth, h = wrap.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
}

// ── Animations ────────────────────────────────────────────────────────
function resetPose(dur = 0.35) {
    if (!kitty) return;
    gsap.killTweensOf(kitty.position);
    gsap.killTweensOf(kitty.rotation);
    gsap.killTweensOf(kitty.scale);
    gsap.to(kitty.position, { x:0, y: kitty.userData.baseY ?? 0, z:0, duration:dur, ease:'power2.out' });
    gsap.to(kitty.rotation, { x:0, y:0, z:0, duration:dur, ease:'power2.out' });
    gsap.to(kitty.scale,    { x:1, y:1, z:1, duration:dur, ease:'power2.out' });
    currentAnim = null;
}

function danceKitty() {
    currentAnim = 'dance';
    const base = kitty.userData.baseY ?? 0;
    const tl = gsap.timeline({ repeat:3, onComplete: () => resetPose() });
    tl.to(kitty.rotation, { z:-0.18, duration:.27, ease:'sine.inOut' }, 0)
      .to(kitty.position, { y:base+.13, duration:.21, ease:'power1.out'}, 0)
      .to(kitty.position, { y:base,     duration:.17, ease:'power1.in' }, .21)
      .to(kitty.rotation, { z: .18, duration:.27, ease:'sine.inOut'    }, .44)
      .to(kitty.position, { y:base+.13, duration:.21, ease:'power1.out'}, .44)
      .to(kitty.position, { y:base,     duration:.17, ease:'power1.in' }, .65)
      .to(kitty.rotation, { z:0,    duration:.18, ease:'sine.inOut'    }, .88);
}

function jumpKitty() {
    currentAnim = 'jump';
    const base = kitty.userData.baseY ?? 0;
    const tl = gsap.timeline({ onComplete: () => { currentAnim = null; } });
    tl.to(kitty.scale,    { y:.83, duration:.12, ease:'power2.in' })
      .to(kitty.position, { y:base+1.1, duration:.38, ease:'power2.out'})
      .to(kitty.scale,    { y:1.12, duration:.16 }, '-=.30')
      .to(kitty.scale,    { y:1,    duration:.16 })
      .to(kitty.position, { y:base, duration:.32, ease:'bounce.out' })
      .to(kitty.scale,    { y:.88,  duration:.08 }, '-=.14')
      .to(kitty.scale,    { y:1,    duration:.18 });
}

function spinKitty() {
    currentAnim = 'spin';
    const tl = gsap.timeline({ onComplete: () => { currentAnim = null; } });
    tl.to(kitty.rotation, { y:'+=6.2832', duration:1.15, ease:'power2.inOut' })
      .to(kitty.scale, { x:1.1, y:1.1, duration:.28, ease:'power1.out'}, .1)
      .to(kitty.scale, { x:1,   y:1,   duration:.28, ease:'power1.in' }, .6);
}

function attackKitty() {
    currentAnim = 'attack';
    const tl = gsap.timeline({ onComplete: () => resetPose(.25) });
    tl.to(kitty.position, { x:.10, duration:.05, ease:'none', repeat:10, yoyo:true })
      .to(kitty.scale,    { x:1.18, y:1.18, duration:.12, ease:'power1.out', repeat:3, yoyo:true }, 0)
      .to(kitty.rotation, { z:-.14, duration:.07, repeat:5, yoyo:true, ease:'none' }, 0);
}

// ── Modal ─────────────────────────────────────────────────────────────
let ready = false;
function openModal() {
    overlay.classList.add('open');
    if (!ready) { ready = true; initScene(); loadModel(); }
    else onResize();
}
function closeModal() {
    resetPose(.2);
    overlay.classList.remove('open');
    document.querySelectorAll('.btns button').forEach(b => b.classList.remove('active'));
}

document.getElementById('openBtn').addEventListener('click', openModal);
document.getElementById('closeBtn').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

document.querySelectorAll('.btns button').forEach(btn => {
    btn.addEventListener('click', () => {
        if (!kitty) return;
        const anim = btn.dataset.anim;
        resetPose(.18);
        document.querySelectorAll('.btns button').forEach(b => b.classList.remove('active'));
        if (anim === 'reset') return;
        btn.classList.add('active');
        setTimeout(() => {
            switch (anim) {
                case 'dance':  danceKitty();  break;
                case 'jump':   jumpKitty();   break;
                case 'spin':   spinKitty();   break;
                case 'attack': attackKitty(); break;
            }
        }, 200);
    });
});
</script>
</body>
</html>
