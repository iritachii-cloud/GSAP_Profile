<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shadow Claw – Dark Kitty 3D</title>
    <link rel="stylesheet" href="shadow-claw.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three":         "https://unpkg.com/three@0.161.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="shadow-claw.js"></script>
</head>
<body>

<div class="particles-bg" id="particlesBg"></div>

<button class="open-btn" id="openBtn">🌙 Awaken Shadow Claw 🌙</button>

<div class="overlay" id="overlay">
    <div class="card">
        <button class="close-btn" id="closeBtn">✕</button>
        <h2>🐾 Shadow Claw 🐾</h2>
        <div class="canvas-wrap">
            <canvas id="c"></canvas>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Summoning Shadow Claw…</p>
            </div>
        </div>
        <div class="btns"></div>
        <p class="hint">⚡ Drag to rotate · Scroll to zoom ⚡</p>
    </div>
</div>

</body>
</html>
