<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fanny · Land of Dawn</title>
    <link rel="stylesheet" href="fanny.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three":         "https://unpkg.com/three@0.161.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="fanny.js"></script>
</head>
<body>

<div class="particles-bg" id="particlesBg"></div>

<button class="open-btn" id="openFannyBtn">⚔️ SUMMON FANNY ⚔️</button>

<div class="overlay" id="fannyModal">
    <div class="card">
        <button class="close-btn" id="closeFannyBtn">✕</button>
        <h2>✦ FANNY ✦</h2>
        <div class="canvas-wrap">
            <canvas id="fannyCanvas"></canvas>
            <div class="loading" id="fannyLoading">
                <div class="spinner"></div>
                <p>Awakening the Cable Ninja…</p>
            </div>
        </div>
        <div class="btns"></div>
        <p class="hint">🖱️ Drag to rotate · Scroll to zoom · Powered by the Magic Wheel 🖱️</p>
    </div>
</div>

</body>
</html>
