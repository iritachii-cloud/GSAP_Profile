<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | Shadow Archive</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header>
    <div class="logo"><a href="index.html">SHADOW ARCHIVE</a></div>
    <nav><a href="index.html">Home</a><a href="register.html" class="active">Register</a></nav>
  </header>
  <main>
    <form id="regForm" class="form-box">
      <h2>Create Your Shadow</h2>
      <input type="text" id="fname" placeholder="First Name" required>
      <input type="text" id="lname" placeholder="Last Name" required>
      <input type="text" id="username" placeholder="Username" required>
      <input type="date" id="dob" required>
      <select id="gender"><option>Male</option><option>Female</option><option>Other</option></select>
      <input type="email" id="email" placeholder="Email" required>
      <button type="submit" class="btn btn-primary">Summon Shadow</button>
    </form>
    <div id="result" class="form-box hidden" style="text-align:center;"></div>
  </main>
  <footer>© 2026 Digital Shadow Archive</footer>

  <script src="secret.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/github.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      if (!username || !email) return alert('Username and email are required');

      await DataSystem.loadCards();
      if (DataSystem.isUsernameTaken(username)) {
        return alert('That username is already taken. Choose another shadow name.');
      }

      const id = Utils.generateId(12);
      const secret = Utils.generateSecret();
      const verificationCode = Math.floor(1000 + Math.random() * 9000).toString(); // 4-digit code

      const card = {
        id,
        secretCode: secret,
        status: "pending",
        verificationCode,
        email,
        coreIdentity: {
          firstName: document.getElementById('fname').value.trim(),
          lastName: document.getElementById('lname').value.trim(),
          nickname: '',
          username,
          dateOfBirth: document.getElementById('dob').value,
          age: Utils.getAge(document.getElementById('dob').value),
          gender: document.getElementById('gender').value,
          nationality: '',
          bloodGroup: ''
        },
        officialDetails: {
          cardNumber: id,
          cardType: 'Shadow Neophyte',
          organization: 'Independent',
          role: 'Member',
          issueDate: new Date().toISOString().split('T')[0],
          expiryDate: '2099-12-31'
        },
        personalityTraits: {
          personalityType: '',
          strengths: [],
          weaknesses: [],
          habits: [],
          petPeeves: []
        },
        likesDislikes: { likes: [], dislikes: [] },
        favorites: { musicGenre: '', artist: '', song: '', songName: '', anime: '', animeCharacter: '', movieSeries: '', game: '', food: '', drink: '', color: '#ff3366', quote: '' },
        lifestyle: { hobbies: [], skills: [], dreamDestination: '', biggestFear: '', biggestMotivation: '' },
        digitalSocial: { gamerTag: '', socialHandle: '' },
        storyMode: { lifeMotto: '', makesHappy: '', breaksThem: '', protectAtAllCosts: '', secretSoftSpot: '' },
        media: { dp: 'assets/images/default-dp.png', gallery: [] }
      };

      try {
        await githubDB.addCard(card);
        showSuccess(card);
      } catch (err) {
        console.error(err);
        alert('Registration failed: ' + err.message);
      }
    });

    function showSuccess(card) {
      document.getElementById('regForm').classList.add('hidden');
      const result = document.getElementById('result');
      result.classList.remove('hidden');
      result.innerHTML = `
        <h3>🎭 Shadow Summoned!</h3>
        <p>Check your email (<strong>${card.email}</strong>) for a verification code.</p>
        <p style="color:var(--accent2);"><em>(Simulated: Your code is <strong>${card.verificationCode}</strong>)</em></p>
        <p>Enter the code to activate your shadow:</p>
        <input type="text" id="verifyInput" placeholder="Verification Code" maxlength="4">
        <button id="verifyBtn" class="btn btn-primary" style="margin-top:1rem;">Verify & Activate</button>
        <p class="hidden" id="verifyError" style="color:red;"></p>
      `;

      document.getElementById('verifyBtn').addEventListener('click', async () => {
        const code = document.getElementById('verifyInput').value.trim();
        if (code === card.verificationCode) {
          // Activate card
          card.status = 'active';
          try {
            await githubDB.updateCard(card.id, card);
            // Auto-login after verification
            UserSession.set(card);
            window.location.href = 'profile.html';
          } catch (err) {
            alert('Activation failed. Please try again.');
          }
        } else {
          document.getElementById('verifyError').classList.remove('hidden');
          document.getElementById('verifyError').textContent = 'Wrong code. Check again.';
        }
      });
    }
  </script>
</body>
</html>
