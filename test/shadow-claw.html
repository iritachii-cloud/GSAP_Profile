<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shadow Claw – Dark 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Orbitron', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #020005);
            overflow: hidden;
        }

        /* floating particles (purple & green) */
        .particles-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .part {
            position: absolute;
            filter: blur(2px);
            animation: floatParticle linear infinite;
            opacity: 0;
        }
        @keyframes floatParticle {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.25; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* open button */
        .open-btn {
            position: relative;
            z-index: 1;
            font-family: 'Orbitron', monospace;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #00ffc3;
            background: linear-gradient(135deg, #1e1a2f, #0a0812);
            border: 2px solid #6a0dad;
            padding: 1rem 2.4rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 0 0 2px #00ff9d33, 0 8px 20px rgba(0, 255, 157, 0.2);
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        .open-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 0 3px #00ff9d, 0 12px 28px #00ff9d33;
            border-color: #00ff9d;
            color: #b0f0ff;
        }
        .open-btn:active {
            transform: translateY(2px);
        }

        /* overlay modal */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(8, 4, 18, 0.75);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s, opacity 0.3s;
        }
        .overlay.open {
            visibility: visible;
            opacity: 1;
        }

        .card {
            position: relative;
            background: #0c0a14ee;
            backdrop-filter: blur(4px);
            border-radius: 38px;
            width: 100%;
            max-width: 640px;
            padding: 1.5rem 1.2rem 1.2rem;
            text-align: center;
            border: 1px solid #6a0dad;
            box-shadow: 0 0 0 2px #2e1a4a, 0 0 0 5px #00ff9d33, 0 30px 60px rgba(0,0,0,0.7);
            transform: scale(0.85) translateY(40px);
            opacity: 0;
            transition: transform 0.45s cubic-bezier(0.2, 1.2, 0.4, 1), opacity 0.35s ease;
        }
        .overlay.open .card {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1a1127;
            border: 1px solid #6f34b0;
            color: #b77eff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-btn:hover {
            transform: rotate(90deg) scale(1.1);
            border-color: #00ff9d;
            color: #00ff9d;
            background: #0d0818;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #c084fc, #00ff9d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 6px #00ff9d44;
        }

        .canvas-wrap {
            width: 100%;
            height: 420px;
            border-radius: 26px;
            overflow: hidden;
            background: #030108;
            box-shadow: inset 0 0 0 2px #3c1e6e, 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background: #030108cc;
            backdrop-filter: blur(8px);
            transition: opacity 0.4s;
            pointer-events: none;
        }
        .loading.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid #6a0dad;
            border-top: 3px solid #00ff9d;
            animation: spin 0.7s linear infinite;
            box-shadow: 0 0 12px #00ff9d;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p {
            color: #b77eff;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .btns {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 1.3rem 0 0.3rem;
        }
        .btns button {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 0.85rem;
            background: linear-gradient(145deg, #14101f, #07050e);
            border: 1px solid #6a2e9e;
            color: #d0b0ff;
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 1px;
            backdrop-filter: blur(2px);
        }
        .btns button:hover {
            transform: translateY(-2px);
            border-color: #00ff9d;
            color: #00ff9d;
            box-shadow: 0 0 10px #00ff9d66;
        }
        .btns button.active {
            background: linear-gradient(145deg, #2a1f40, #1a102f);
            border-color: #00ff9d;
            color: #aaffdd;
            text-shadow: 0 0 4px #0f0;
            box-shadow: inset 0 0 6px #00ff9d, 0 0 12px #00ff9d;
        }

        .hint {
            font-size: 0.7rem;
            color: #956eff;
            opacity: 0.7;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .canvas-wrap { height: 300px; }
            h2 { font-size: 1.6rem; }
            .btns button { padding: 0.45rem 1rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div class="particles-bg" id="particlesBg"></div>

<button class="open-btn" id="openBtn">🌑 SHADOW CLAW 3D 🟣</button>

<div class="overlay" id="overlay">
    <div class="card">
        <button class="close-btn" id="closeBtn">✕</button>
        <h2>⚡ SHADOW CLAW ⚡</h2>
        <div class="canvas-wrap">
            <canvas id="c"></canvas>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Summoning Shadow Claw…</p>
            </div>
        </div>
        <div class="btns">
            <button data-anim="dance">🌀 DANCE</button>
            <button data-anim="spin">💫 SPIN</button>
            <button data-anim="claw">🔪 CLAW ATTACK</button>
            <button data-anim="reset">⌛ RESET</button>
        </div>
        <p class="hint">✨ drag to rotate · scroll to zoom | dark energy inside ✨</p>
    </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ------------------------- DARK PARTICLES (purple + green) -------------------------
const particlesBg = document.getElementById('particlesBg');
const symbols = ['⚡', '🟣', '🔪', '🌑', '💚', '🌙', '🐾'];
for (let i = 0; i < 32; i++) {
    const el = document.createElement('span');
    el.className = 'part';
    const isGreen = Math.random() > 0.6;
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.cssText = `
        left: ${Math.random() * 100}%;
        font-size: ${1 + Math.random() * 2}rem;
        animation-duration: ${12 + Math.random() * 18}s;
        animation-delay: ${-Math.random() * 28}s;
        color: ${isGreen ? '#0f6' : '#c67aff'};
        text-shadow: 0 0 4px ${isGreen ? '#0f6' : '#b14eff'};
    `;
    particlesBg.appendChild(el);
}

// ------------------------- THREE SETUP -------------------------
let renderer, scene, camera, controls, shadowClaw;
let currentAnim = null;
let clawEffectGroup = null;   // for green claw visuals
const canvas = document.getElementById('c');
const overlay = document.getElementById('overlay');
const loadingDiv = document.getElementById('loading');

function initScene() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020108);
    scene.fog = new THREE.FogExp2(0x020108, 0.022);

    camera = new THREE.PerspectiveCamera(38, 1, 0.05, 180);
    camera.position.set(0, 1.4, 5.2);

    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ReinhardToneMapping;
    renderer.toneMappingExposure = 1.3;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    // ------ dark but dramatic lighting ------
    const ambient = new THREE.AmbientLight(0x221144, 1.85);
    scene.add(ambient);
    
    const mainLight = new THREE.DirectionalLight(0xba7aff, 2.4);
    mainLight.position.set(3, 5, 2.5);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 1024;
    mainLight.shadow.mapSize.height = 1024;
    scene.add(mainLight);
    
    const fillLight = new THREE.PointLight(0x6a2c8f, 0.9);
    fillLight.position.set(-2, 2, 3);
    scene.add(fillLight);
    
    const greenFill = new THREE.PointLight(0x00bb66, 0.6);
    greenFill.position.set(1.5, 1.2, -2);
    scene.add(greenFill);
    
    const backRim = new THREE.PointLight(0xaa44ff, 0.7);
    backRim.position.set(0, 1.5, -4);
    scene.add(backRim);
    
    const subtle = new THREE.HemisphereLight(0x432b6e, 0x141414, 0.6);
    scene.add(subtle);
    
    // dark shadow catcher
    const shadowPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(18, 18),
        new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000, transparent: true, side: THREE.DoubleSide })
    );
    shadowPlane.rotation.x = -Math.PI / 2;
    shadowPlane.position.y = -0.05;
    shadowPlane.receiveShadow = true;
    scene.add(shadowPlane);
    
    // subtle purple grid floor
    const gridHelper = new THREE.GridHelper(14, 20, 0x9b4dff, 0x3a1e6e);
    gridHelper.position.y = -0.08;
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.22;
    scene.add(gridHelper);
    
    controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.07;
    controls.autoRotate = false;
    controls.enablePan = false;
    controls.zoomSpeed = 1.2;
    controls.minDistance = 1.2;
    controls.maxDistance = 12;
    
    function animate() {
        requestAnimationFrame(animate);
        if (shadowClaw && !currentAnim) {
            // idle subtle float
            shadowClaw.position.y = (shadowClaw.userData.baseY ?? 0) + Math.sin(Date.now() * 0.002) * 0.03;
        }
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', onResize);
    onResize();
}

function onResize() {
    const wrap = document.querySelector('.canvas-wrap');
    const w = wrap.clientWidth, h = wrap.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
}

// ---------- LOAD MODEL (shadow_claw.glb) ----------
function loadModel() {
    const loader = new GLTFLoader();
    loader.load('shadow_claw.glb', (gltf) => {
        shadowClaw = gltf.scene;
        
        // auto size fitting (height ~2.5 units)
        const box = new THREE.Box3().setFromObject(shadowClaw);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const targetHeight = 2.4;
        const scaleFactor = targetHeight / size.y;
        shadowClaw.scale.setScalar(scaleFactor);
        shadowClaw.position.sub(center.multiplyScalar(scaleFactor));
        
        // place on floor
        const box2 = new THREE.Box3().setFromObject(shadowClaw);
        shadowClaw.position.y -= box2.min.y;
        shadowClaw.userData.baseY = shadowClaw.position.y;
        
        shadowClaw.traverse(obj => {
            if (obj.isMesh) {
                obj.castShadow = true;
                obj.receiveShadow = true;
                if (obj.material) {
                    obj.material.roughness = 0.38;
                    obj.material.metalness = 0.1;
                }
            }
        });
        
        scene.add(shadowClaw);
        
        const modelCenter = new THREE.Box3().setFromObject(shadowClaw).getCenter(new THREE.Vector3());
        controls.target.copy(modelCenter);
        camera.position.set(modelCenter.x, modelCenter.y + 0.3, modelCenter.z + 4.8);
        controls.update();
        
        loadingDiv.classList.add('hidden');
    }, (xhr) => {
        if (xhr.total) {
            loadingDiv.querySelector('p').innerHTML = `summoning... ${Math.round(xhr.loaded / xhr.total * 100)}%`;
        }
    }, (err) => {
        console.error(err);
        loadingDiv.querySelector('p').innerHTML = '⚠️ shadow_claw.glb not found.\nPlace your GLB file next to this HTML.';
        loadingDiv.style.background = '#aa00aa33';
    });
}

// ------------------------- RESET FUNCTION -------------------------
function resetPose(duration = 0.35) {
    if (!shadowClaw) return;
    gsap.killTweensOf(shadowClaw.position);
    gsap.killTweensOf(shadowClaw.rotation);
    gsap.killTweensOf(shadowClaw.scale);
    gsap.to(shadowClaw.position, { x: 0, y: shadowClaw.userData.baseY ?? 0, z: 0, duration: duration, ease: 'power2.out' });
    gsap.to(shadowClaw.rotation, { x: 0, y: 0, z: 0, duration: duration, ease: 'power2.out' });
    gsap.to(shadowClaw.scale, { x: 1, y: 1, z: 1, duration: duration, ease: 'power2.out' });
    currentAnim = null;
    
    // remove any claw effect leftovers
    if (clawEffectGroup) {
        scene.remove(clawEffectGroup);
        clawEffectGroup = null;
    }
}

// ************* DANCE (stylish moves *************
function danceShadow() {
    if (!shadowClaw) return;
    currentAnim = 'dance';
    const baseY = shadowClaw.userData.baseY ?? 0;
    const tl = gsap.timeline({ repeat: 2, repeatDelay: 0.1, onComplete: () => { resetPose(0.25); } });
    // rock step + side sway + bounce
    tl.to(shadowClaw.rotation, { z: -0.16, duration: 0.2, ease: 'power1.inOut' }, 0)
      .to(shadowClaw.position, { y: baseY + 0.12, duration: 0.15, ease: 'power1.out' }, 0)
      .to(shadowClaw.position, { y: baseY, duration: 0.12, ease: 'power1.in' }, 0.15)
      .to(shadowClaw.rotation, { z: 0.16, duration: 0.2, ease: 'power1.inOut' }, 0.28)
      .to(shadowClaw.position, { y: baseY + 0.1, duration: 0.13, ease: 'power1.out' }, 0.28)
      .to(shadowClaw.position, { y: baseY, duration: 0.12, ease: 'power1.in' }, 0.41)
      .to(shadowClaw.rotation, { z: -0.12, duration: 0.18, ease: 'sine.inOut' }, 0.55)
      .to(shadowClaw.position, { y: baseY + 0.14, duration: 0.12, ease: 'power2.out' }, 0.55)
      .to(shadowClaw.position, { y: baseY, duration: 0.14, ease: 'bounce.out' }, 0.67)
      .to(shadowClaw.rotation, { z: 0, duration: 0.2, ease: 'back.inOut' }, 0.8);
      
    // add tiny scale wobble for effect
    tl.to(shadowClaw.scale, { x: 1.03, y: 1.03, duration: 0.1, repeat: 3, yoyo: true, ease: 'none' }, 0.1);
}

// ************* SPIN: one full rotation then auto reset *************
function spinShadow() {
    if (!shadowClaw) return;
    currentAnim = 'spin';
    const tl = gsap.timeline({ onComplete: () => { resetPose(0.2); } });
    tl.to(shadowClaw.rotation, { y: '+=6.2832', duration: 0.95, ease: 'power2.inOut' })
      .to(shadowClaw.scale, { x: 1.08, y: 1.08, duration: 0.2, ease: 'power1.out' }, 0.1)
      .to(shadowClaw.scale, { x: 1, y: 1, duration: 0.25, ease: 'elastic.out' }, 0.55);
}

// ************* CLAW ATTACK: green slashes + model shake *************
function createClawEffect(centerPos) {
    if (clawEffectGroup) {
        scene.remove(clawEffectGroup);
        clawEffectGroup = null;
    }
    const group = new THREE.Group();
    const colors = [0x39ff14, 0x2effa0, 0x0eff70];
    // three claw marks (angled planes/boxes)
    const positions = [[-0.4, 0.2], [0, -0.1], [0.45, 0.25]];
    positions.forEach((offset, idx) => {
        const clawGeo = new THREE.BoxGeometry(0.28, 0.05, 0.06);
        const material = new THREE.MeshStandardMaterial({ color: colors[idx % colors.length], emissive: 0x11ff33, emissiveIntensity: 0.7 });
        const slash = new THREE.Mesh(clawGeo, material);
        slash.position.set(offset[0], offset[1] + 0.1, 0.7);
        slash.rotation.z = (Math.random() - 0.5) * 0.9;
        slash.rotation.x = 0.4;
        slash.castShadow = false;
        group.add(slash);
    });
    // add glowing lines
    const lineMat = new THREE.LineBasicMaterial({ color: 0x3eff6e });
    for (let i = 0; i < 3; i++) {
        const points = [];
        points.push(new THREE.Vector3(-0.3 + i * 0.3, -0.2, 0.9));
        points.push(new THREE.Vector3(-0.1 + i * 0.3, 0.25, 0.95));
        const geom = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.Line(geom, lineMat);
        group.add(line);
    }
    group.position.copy(centerPos);
    group.position.z += 0.45;
    group.position.y += 0.15;
    scene.add(group);
    clawEffectGroup = group;
    
    gsap.to(group.scale, { x: 1.4, y: 1.4, duration: 0.12, yoyo: true, repeat: 2, ease: 'power1.inOut' });
    gsap.to(group.children.map(c => c.material), { emissiveIntensity: 1.2, duration: 0.07, yoyo: true, repeat: 5, onComplete: () => {
        if (clawEffectGroup) {
            gsap.to(clawEffectGroup.scale, { x: 0, y: 0, duration: 0.2, onComplete: () => {
                if (clawEffectGroup) scene.remove(clawEffectGroup);
                clawEffectGroup = null;
            } });
        }
    } });
}

function clawAttack() {
    if (!shadowClaw) return;
    currentAnim = 'claw';
    const basePos = shadowClaw.position.clone();
    const centerPos = shadowClaw.position.clone();
    centerPos.y += 0.6;
    
    createClawEffect(centerPos);
    
    const tl = gsap.timeline({ onComplete: () => { resetPose(0.25); } });
    tl.to(shadowClaw.position, { x: 0.1, duration: 0.035, repeat: 3, yoyo: true, ease: 'none' }, 0)
      .to(shadowClaw.rotation, { z: -0.11, duration: 0.06, repeat: 3, yoyo: true, ease: 'none' }, 0)
      .to(shadowClaw.scale, { x: 1.12, y: 1.05, duration: 0.1, repeat: 2, yoyo: true }, 0);
      
    // add screen-like green flash effect via directional light
    const tempLight = new THREE.PointLight(0x3eff6e, 1.4);
    tempLight.position.set(centerPos.x, centerPos.y + 0.3, centerPos.z + 0.9);
    scene.add(tempLight);
    gsap.to(tempLight, { intensity: 0, duration: 0.35, onComplete: () => scene.remove(tempLight) });
}

// ------------------------- MODAL & UI -------------------------
let ready = false;
function openModal() {
    overlay.classList.add('open');
    if (!ready) {
        ready = true;
        initScene();
        loadModel();
    } else {
        onResize();
    }
}

function closeModal() {
    resetPose(0.2);
    overlay.classList.remove('open');
    document.querySelectorAll('.btns button').forEach(b => b.classList.remove('active'));
    if (clawEffectGroup) {
        scene.remove(clawEffectGroup);
        clawEffectGroup = null;
    }
}

document.getElementById('openBtn').addEventListener('click', openModal);
document.getElementById('closeBtn').addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

document.querySelectorAll('.btns button').forEach(btn => {
    btn.addEventListener('click', () => {
        if (!shadowClaw) return;
        const anim = btn.dataset.anim;
        resetPose(0.2);
        document.querySelectorAll('.btns button').forEach(b => b.classList.remove('active'));
        if (anim === 'reset') return;
        btn.classList.add('active');
        setTimeout(() => {
            switch (anim) {
                case 'dance': danceShadow(); break;
                case 'spin': spinShadow(); break;
                case 'claw': clawAttack(); break;
                default: break;
            }
        }, 120);
    });
});
</script>
</body>
</html>
